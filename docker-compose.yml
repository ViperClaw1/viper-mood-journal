services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mood_journal
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app

  # Backend: secrets and optional vars come from env_file (backend/.env).
  # Copy backend/.env.example -> backend/.env (see repo root .env.example for the same template).
  # docker-compose only overrides PORT + DATABASE_URL here so the container uses host "postgres", not localhost.
  #
  # Expected in backend/.env for full auth + mail + AI:
  #   ANTHROPIC_API_KEY, JWT_SECRET,
  #   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_CALLBACK_URL,
  #   NODE_ENV (optional), FRONTEND_ORIGIN, PUBLIC_API_URL (optional; avatar URLs),
  #   MAIL_FROM, SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS,
  #   PASSWORD_RESET_FRONTEND_URL
  #
  # Rebuild after route/code changes: docker compose build --no-cache backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/mood_journal"
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
